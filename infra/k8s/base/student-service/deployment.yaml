apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-service
  template:
    metadata:
      labels:
        app: student-service
    spec:
      containers:
        - name: student-service
          image: face-attendance/student-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: student-service-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8082
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  selector:
    app: student-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
