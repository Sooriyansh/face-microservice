apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: face-attendance/analytics-service:latest
          ports:
            - containerPort: 8088
          env:
            - name: PORT
              value: "8088"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8088
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088

