apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: face-attendance/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: STUDENT_SERVICE_URL
              value: http://student-service:8082
            - name: ATTENDANCE_SERVICE_URL
              value: http://attendance-service:8083
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8084
            - name: SYSTEM_EVENTS_SERVICE_URL
              value: http://system-events-service:8094
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:8088
            - name: AUDIT_SERVICE_URL
              value: http://audit-service:8087
            - name: FACE_RECOGNITION_SERVICE_URL
              value: http://face-recognition-service:8093
            - name: TRAINING_SERVICE_URL
              value: http://training-service:8092
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: auth-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
