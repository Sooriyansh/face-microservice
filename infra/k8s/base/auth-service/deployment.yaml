apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: face-attendance/auth-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
