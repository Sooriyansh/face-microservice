apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: face-attendance/notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: PORT
              value: "8084"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8084
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084

