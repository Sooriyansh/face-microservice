apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: face-attendance/audit-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: PORT
              value: "8087"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: audit-service-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8087
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
spec:
  selector:
    app: audit-service
  ports:
    - name: http
      port: 8087
      targetPort: 8087

